name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_ENV: test

jobs:
  check:
    name: Build, Check, Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout AlembicAgent
        uses: actions/checkout@v5
        with:
          path: AlembicAgent

      - name: Checkout AlembicCore sibling
        uses: actions/checkout@v5
        with:
          repository: GxFn/AlembicCore
          path: AlembicCore
          token: ${{ secrets.ALEMBIC_CI_TOKEN || github.token }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            AlembicAgent/package-lock.json
            AlembicCore/package-lock.json

      - name: Install AlembicCore dependencies
        working-directory: AlembicCore
        run: npm ci

      - name: Build AlembicCore sibling
        working-directory: AlembicCore
        run: npm run build

      - name: Install dependencies
        working-directory: AlembicAgent
        run: npm ci

      - name: Typecheck
        working-directory: AlembicAgent
        run: npm run build:check

      - name: Lint
        working-directory: AlembicAgent
        run: npm run lint

      - name: Import boundary
        working-directory: AlembicAgent
        run: npm run lint:agent-import-boundary

      - name: Build
        working-directory: AlembicAgent
        run: npm run build

      - name: Test
        working-directory: AlembicAgent
        run: npm run test

      - name: Package export smoke
        working-directory: AlembicAgent
        run: npm run smoke:public-imports
